name: Full Sync Books

permissions:
  contents: write

on:
  workflow_dispatch:  # 只允许手动触发
  # 也可以添加一次性schedule，例如：
  # schedule:
  #   - cron: '0 0 1 1 *'  # 每年1月1日执行一次

jobs:
  full-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 600  # 全量同步可能需要较长时间（10小时，支持处理6万+书籍）
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 获取完整历史，避免推送冲突

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 aiohttp

      - name: Full sync books
        env:
          BOOK_SITE_DOMAIN: ${{ secrets.BOOK_SITE_DOMAIN }}
          OUTPUT_DIR: md
        run: |
          # 检查环境变量
          if [ -z "$BOOK_SITE_DOMAIN" ]; then
            echo "⚠️  警告: BOOK_SITE_DOMAIN 未设置，跳过同步"
            echo "请在 GitHub Repository Settings > Secrets and variables > Actions 中添加 BOOK_SITE_DOMAIN"
            exit 0
          fi
          
          echo "✅ BOOK_SITE_DOMAIN 已从GitHub Secrets加载"
          echo "📁 输出目录: $OUTPUT_DIR"
          
          # 运行全量同步脚本（会自动查找最大ID并更新README和all_books.json）
          # 使用分批处理：每批20000本，降低单次运行风险，配合断点续传和超时保护
          cd scripts/sync
          python3 sync_all_books.py --skip-backup --batch-size 20000

      - name: Commit and push changes
        if: success()  # 只有同步成功才提交
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查是否有变更
          if [ -n "$(git status --porcelain)" ]; then
            # 添加所有变更（md目录、README.md、all_books.json等）
            git add md/ README.md docs/all-books.json docs/parse-stats.json || true
            git commit -m "auto: full sync books and update README [skip ci]" || echo "No changes to commit"
            
            # 在推送前先拉取远程更改（避免推送冲突）
            echo "📥 拉取远程最新更改..."
            git fetch origin main
            git pull origin main --rebase || git pull origin main --no-rebase || true
            
            # 推送更改（最多重试3次）
            max_retries=3
            retry_count=0
            while [ $retry_count -lt $max_retries ]; do
              if git push origin main; then
                echo "✅ 推送成功"
                break
              else
                retry_count=$((retry_count + 1))
                echo "⚠️  推送失败，重试 $retry_count/$max_retries..."
                if [ $retry_count -lt $max_retries ]; then
                  # 重新拉取并合并
                  git fetch origin main
                  git rebase origin/main || git merge origin/main || true
                  sleep 2
                else
                  echo "❌ 推送失败，已达到最大重试次数"
                  exit 1
                fi
              fi
            done
          else
            echo "No changes to commit"
          fi
